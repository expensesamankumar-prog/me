<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
    <g>
        <!-- Letter A (Blue) - Compressed Width, Modern Angles -->
        <g>
            <!-- A shape: thinner width, sharper futuristic apex -->
            <path d="M15 85 L28 15 L41 85 M19 60 L37 60" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
            <animate attributeName="opacity" values="1; 0.6; 1" dur="3s" repeatCount="20" />
        </g>
        
        <!-- Letter K (Gold) - Compressed Width, Futuristic Look -->
        <g>
            <!-- Vertical line of K -->
            <path d="M55 15 L55 85" stroke="#fbbf24" stroke-width="12" stroke-linecap="round" />
            <!-- Angle lines of K (starts from center)-->
            <path d="M85 15 L55 50 L85 85" stroke="#fbbf24" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
            <animate attributeName="opacity" values="0.6; 1; 0.6" dur="3s" repeatCount="20" />
        </g>
        
        <!-- Sweeping Futuristic Glow Effect Layer -->
        <g>
            <polygon points="-60,0 -20,0 20,100 -20,100" fill="url(#shineGrad)">
                <animateTransform attributeName="transform" type="translate" values="-40,0; 180,0; 180,0" keyTimes="0; 0.15; 1" dur="4s" repeatCount="15" />
            </polygon>
        </g>
    </g>

    <defs>
        <!-- Gradient for the light beam -->
        <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
            <stop offset="50%" stop-color="#ffffff" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
        </linearGradient>
    </defs>
</svg>
