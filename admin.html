<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Aman Kumar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': 'var(--color-primary)',
                        'secondary': 'var(--color-secondary)',
                        'accent': 'var(--color-accent)',
                        'neon-blue': 'var(--color-neon-blue)',
                    },
                },
            },
        }
    </script>
    <style>
        :root {
            --color-primary: #030305;
            --color-secondary: #0a0a0e;
            --color-accent: #fbbf24;
            --color-neon-blue: #3b82f6;
        }
        body { background: var(--color-primary); color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen p-8">
    <nav class="flex justify-between items-center mb-12">
        <a href="index.html" class="text-2xl font-bold text-accent">&lt; Back to Portfolio</a>
        <div class="flex items-center space-x-4">
            <span class="text-gray-400">Admin Mode</span>
            <div class="w-10 h-10 rounded-full bg-accent flex items-center justify-center font-bold text-primary">A</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold mb-8">Admin Dashboard</h1>
        
        <div class="grid md:grid-cols-2 gap-8">
            <!-- Theme Settings -->
            <div class="glass p-8 rounded-2xl">
                <h2 class="text-2xl font-semibold mb-6">Global Theme Settings</h2>
                <p class="text-gray-400 mb-6">Select the default palette for the entire site.</p>
                
                <div class="space-y-4">
                    <button onclick="applyTheme('gold')" class="w-full p-4 rounded-xl flex items-center justify-between border border-white/10 hover:border-accent group">
                        <span class="flex items-center"><div class="w-4 h-4 bg-[#fbbf24] rounded-full mr-3"></div> Gold (Classic)</span>
                        <span class="opacity-0 group-hover:opacity-100 text-accent">Apply</span>
                    </button>
                    <button onclick="applyTheme('emerald')" class="w-full p-4 rounded-xl flex items-center justify-between border border-white/10 hover:border-[#10b981] group">
                        <span class="flex items-center"><div class="w-4 h-4 bg-[#10b981] rounded-full mr-3"></div> Emerald (Modern)</span>
                        <span class="opacity-0 group-hover:opacity-100 text-[#10b981]">Apply</span>
                    </button>
                    <button onclick="applyTheme('ruby')" class="w-full p-4 rounded-xl flex items-center justify-between border border-white/10 hover:border-[#ef4444] group">
                        <span class="flex items-center"><div class="w-4 h-4 bg-[#ef4444] rounded-full mr-3"></div> Ruby (Vibrant)</span>
                        <span class="opacity-0 group-hover:opacity-100 text-[#ef4444]">Apply</span>
                    </button>
                    <button onclick="applyTheme('midnight')" class="w-full p-4 rounded-xl flex items-center justify-between border border-white/10 hover:border-[#8b5cf6] group">
                        <span class="flex items-center"><div class="w-4 h-4 bg-[#8b5cf6] rounded-full mr-3"></div> Midnight (Deep)</span>
                        <span class="opacity-0 group-hover:opacity-100 text-[#8b5cf6]">Apply</span>
                    </button>
                </div>
            </div>

            <!-- Page Management -->
            <div class="glass p-8 rounded-2xl">
                <h2 class="text-2xl font-semibold mb-6">System Status</h2>
                <div class="space-y-6">
                    <div class="flex justify-between border-b border-white/5 pb-4">
                        <span class="text-gray-400">Environment</span>
                        <span class="text-emerald-500">Production</span>
                    </div>
                    <div class="flex justify-between border-b border-white/5 pb-4">
                        <span class="text-gray-400">Total Visits</span>
                        <span class="text-white">1,284</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">Last Theme Push</span>
                        <span id="last-update" class="text-white">Today, 3:45 PM</span>
                    </div>
                    
                    <button class="w-full mt-6 py-3 bg-neon-blue rounded-xl font-semibold hover:bg-blue-500 transition-colors">
                        Save Global Config
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/themes.js"></script>
    <script>
        window.addEventListener('themeChanged', (e) => {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('last-update').textContent = `Just now, ${time}`;
        });
    </script>
</body>
</html>
