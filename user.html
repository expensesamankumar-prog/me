<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Aman Kumar | Full-Stack Developer & Linux Systems Specialist</title>
    <meta name="description" content="User Profile - Aman Kumar - Full-Stack Developer, Linux systems enthusiast, and Audio Engineer.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://amankumar.pages.dev/user.html">
    <meta property="og:title" content="My Profile | Aman Kumar | Portfolio">
    <meta property="og:description" content="View the profile and preferences of Aman Kumar, developer and Linux specialist.">
    <meta property="og:image" content="https://amankumar.pages.dev/assets/og-preview.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://amankumar.pages.dev/user.html">
    <meta property="twitter:title" content="My Profile | Aman Kumar | Portfolio">
    <meta property="twitter:description" content="User profile for Aman Kumar, specializing in Linux, Cloudflare, and Audio systems.">
    <meta property="twitter:image" content="https://amankumar.pages.dev/assets/og-preview.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': 'var(--color-primary)',
                        'secondary': 'var(--color-secondary)',
                        'accent': 'var(--color-accent)',
                        'neon-blue': 'var(--color-neon-blue)',
                    },
                },
            },
        }
    </script>
    <style>
        :root {
            --color-primary: #030305;
            --color-secondary: #0a0a0e;
            --color-accent: #fbbf24;
            --color-neon-blue: #3b82f6;
        }
        body { background: var(--color-primary); color: white; font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .theme-card { cursor: pointer; transition: all 0.3s ease; border: 2px solid transparent; }
        .theme-card:hover { transform: translateY(-5px); }
        .theme-card.active { border-color: var(--color-accent); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen p-8">
    <nav class="flex justify-between items-center mb-12">
        <a href="index.html" class="text-2xl font-bold text-accent">&lt; Back</a>
        <div class="flex items-center space-x-4">
            <span class="text-gray-400">User Dashboard</span>
            <div id="user-avatar" class="w-10 h-10 rounded-full bg-neon-blue flex items-center justify-center font-bold text-white overflow-hidden">U</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto">
        <div class="flex items-end space-x-6 mb-12">
            <div id="user-hero-pic" class="w-24 h-24 bg-gradient-to-br from-accent to-neon-blue rounded-2xl flex items-center justify-center text-4xl font-bold overflow-hidden"></div>
            <div>
                <h1 id="user-welcome" class="text-4xl font-bold">Welcome, Guest</h1>
                <p id="user-email-display" class="text-gray-400">Customize your viewing experience</p>
            </div>
        </div>
        
        <h2 class="text-2xl font-semibold mb-6">Choose Your Vibe</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div onclick="applyThemeAndActive('gold', this)" class="theme-card glass p-6 rounded-2xl text-center active" id="theme-gold">
                <div class="w-12 h-12 bg-[#fbbf24] rounded-full mx-auto mb-4"></div>
                <span class="font-medium">Gold</span>
            </div>
            <div onclick="applyThemeAndActive('emerald', this)" class="theme-card glass p-6 rounded-2xl text-center" id="theme-emerald">
                <div class="w-12 h-12 bg-[#10b981] rounded-full mx-auto mb-4"></div>
                <span class="font-medium">Emerald</span>
            </div>
            <div onclick="applyThemeAndActive('ruby', this)" class="theme-card glass p-6 rounded-2xl text-center" id="theme-ruby">
                <div class="w-12 h-12 bg-[#ef4444] rounded-full mx-auto mb-4"></div>
                <span class="font-medium">Ruby</span>
            </div>
            <div onclick="applyThemeAndActive('midnight', this)" class="theme-card glass p-6 rounded-2xl text-center" id="theme-midnight">
                <div class="w-12 h-12 bg-[#8b5cf6] rounded-full mx-auto mb-4"></div>
                <span class="font-medium">Midnight</span>
            </div>
        </div>

        <div class="glass p-8 rounded-2xl">
            <h2 class="text-2xl font-semibold mb-6">Account Settings</h2>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 border-b border-white/5">
                    <div>
                        <p class="font-medium">Email Notifications</p>
                        <p class="text-sm text-gray-400">Get updates about new projects</p>
                    </div>
                    <div class="w-12 h-6 bg-accent rounded-full relative"><div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div></div>
                </div>
                <div class="flex items-center justify-between p-4">
                    <div>
                        <p class="font-medium">Public Profile</p>
                        <p class="text-sm text-gray-400">Allow others to see your bookmarks</p>
                    </div>
                    <div class="w-12 h-6 bg-gray-600 rounded-full relative"><div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full"></div></div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/themes.js"></script>
    <script>
        async function applyThemeAndActive(theme, el) {
            applyTheme(theme);
            document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
            if (el) el.classList.add('active');
            
            // Save to backend if logged in
            const userId = localStorage.getItem('user_id');
            if (userId && localStorage.getItem('is_logged_in') === 'true') {
                try {
                    await fetch('/api/settings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            key: `user_theme_${userId}`, // Generic setting or specifically for this user
                            value: theme,
                            user_id: userId // Our backend handles user_preferences table
                        })
                    });
                } catch (err) { console.error("Failed to save theme:", err); }
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const isLoggedIn = localStorage.getItem('is_logged_in') === 'true';
            const userId = localStorage.getItem('user_id');
            
            // 1. Initial local theme
            let currentTheme = localStorage.getItem('portfolio-theme') || 'gold';

            if (isLoggedIn && userId) {
                try {
                    // 2. Fetch Detailed User Profile + Preferences
                    const res = await fetch(`/api/user?id=${userId}`);
                    const profile = await res.json();
                    
                    if (!profile.error) {
                        // Update UI with DB values
                        document.getElementById('user-welcome').textContent = `Welcome, ${profile.name}`;
                        document.getElementById('user-email-display').textContent = profile.email;
                        
                        if (profile.picture) {
                            const avatar = `<img src="${profile.picture}" class="w-full h-full object-cover">`;
                            document.getElementById('user-avatar').innerHTML = avatar;
                            document.getElementById('user-hero-pic').innerHTML = avatar;
                        }

                        // Apply DB Theme Preference
                        if (profile.preferences && profile.preferences.theme_color) {
                            currentTheme = profile.preferences.theme_color;
                        }
                    }
                } catch (err) {
                    console.error("Profile fetch failed:", err);
                }
            } else {
                // Fallback for Guests
                const name = localStorage.getItem('user_name') || 'Guest';
                document.getElementById('user-welcome').textContent = `Welcome, ${name}`;
            }

            // 3. Set active card and apply theme
            const el = document.getElementById(`theme-${currentTheme}`);
            if (el) {
                applyThemeAndActive(currentTheme, el);
            } else {
                applyTheme(currentTheme);
            }
        });
    </script>
</body>
</html>
